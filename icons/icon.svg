<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ConciencIA — I.E. Sor María Juliana">
  <!-- Fondo con esquinas redondeadas para iconos cuadrados -->
  <rect width="512" height="512" rx="96" fill="#6B1820"/>

  <!-- Anillo dorado decorativo (estética institucional) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#B89968" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="172" fill="none" stroke="#B89968" stroke-width="1" opacity="0.7"/>

  <!-- Iniciales SMJ -->
  <text x="256" y="296" font-family="Georgia, 'Crimson Pro', serif"
        font-size="180" font-weight="700"
        text-anchor="middle" fill="#FAF7F2"
        letter-spacing="-4">SMJ</text>

  <!-- Línea dorada inferior -->
  <line x1="186" y1="352" x2="326" y2="352" stroke="#B89968" stroke-width="3"/>

  <!-- Texto pequeño "ConciencIA" -->
  <text x="256" y="394" font-family="system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="600"
        text-anchor="middle" fill="#D4B886"
        letter-spacing="6">CONCIENCIA</text>
</svg>
